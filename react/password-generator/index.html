<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  </head>
  <body>
    <div class="wrapper">
     <div class="container">
             <!-- for password -->
      <div class="password-generator">PASSWORD GENERATOR</div>
      <!-- show password -->
      <div class="show-pswd">
       <input type="text" value="PASSWORD" id="myInput">
       <button class="fa-copy">
          Copy
        </button>
      </div>
      <div class="lower">
        <!-- password length -->
        <div class="password">
          <p>Password Length</p>
          <p class="password-length">10</p>
        </div>
        <!-- length selector -->
        <div class="slidecontainer">
                <input type="range" min="1" max="20" value="10" class="slider" id="myRange">
        </div>
        <!-- checkbox -->
        <div class="input-container">
          <div>
            <input class="box"  type="checkbox" id="upper" name="upper" value="upper" />
            <label for="upper">Include Upper Case Letters</label>
          </div>
          <div>
            <input class="box" type="checkbox" id="lower" name="lower" value="lower" />
            <label for="lower">Include Lower Case Letteer</label>
          </div>
          <div>
            <input class="box" type="checkbox" id="number" name="number" value="number" />
            <label for="number">Include Numbers</label>
          </div>
          <div>
            <input class="box" type="checkbox" id="symbol" name="symbol" value="symbol" />
            <label for="symbol">Include Symbols</label>
          </div>
        </div>
        <!--strength  -->
        <div class="strength">
          <p>Strenght</p>
          <button class="pswd-threnght"></button>
        </div>
        <!-- generate button -->
        <div>
          <button class="generate-password">GENERATE PASSWORD</button>
        </div>
      </div>
     </div>
 
    </div>
    <script src="index.js"></script>
  </body>
</html>
