<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer">
        <div class="wrapper">
            <h3>Background Changer</h3>
            <div class="container">
                <button class="box" data-color="red"></button>
                <button class="box" data-color="pink"></button>
                <button class="box" data-color="green"></button>
                <button class="box" data-color="yellow"></button>
                <button class="box" data-color="blue"></button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
